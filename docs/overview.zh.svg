<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" font-family="'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e07a5f"/>
      <stop offset="100%" stop-color="#f2cc8f"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLg" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ccc"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1800" fill="#f8f9fa"/>

  <!-- ==================== HEADER ==================== -->
  <rect width="1200" height="250" fill="url(#headerBg)"/>

  <circle cx="100" cy="95" r="42" fill="url(#accent)" opacity="0.9"/>
  <text x="100" y="103" text-anchor="middle" fill="#1a1a2e" font-size="32" font-weight="bold">BP</text>

  <text x="160" y="80" fill="#f5f0e8" font-size="42" font-weight="bold">Backlink Pilot</text>
  <text x="160" y="115" fill="#e07a5f" font-size="22" font-weight="600">v2.1</text>
  <text x="220" y="115" fill="#8a8fa8" font-size="18">— 自动化外链提交工具</text>

  <text x="160" y="155" fill="#b8bcc8" font-size="16">一条命令提交外链。配置一次产品信息，自动提交到目录站、awesome-list、搜索引擎。</text>

  <!-- Stats badges -->
  <rect x="60" y="200" width="160" height="36" rx="18" fill="#e07a5f" opacity="0.9"/>
  <text x="140" y="223" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">259 个目标站点</text>

  <rect x="240" y="200" width="200" height="36" rx="18" fill="#81b29a" opacity="0.9"/>
  <text x="340" y="223" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">226 个可自动提交</text>

  <rect x="460" y="200" width="200" height="36" rx="18" fill="#3d5a80" opacity="0.9"/>
  <text x="560" y="223" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">2400+ 外链数据</text>

  <rect x="680" y="200" width="160" height="36" rx="18" fill="#f2cc8f" opacity="0.85"/>
  <text x="760" y="223" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="600">MIT 开源协议</text>

  <!-- ==================== 项目是什么 ==================== -->
  <text x="60" y="300" fill="#1a1a2e" font-size="26" font-weight="bold">项目是什么？</text>
  <line x1="60" y1="312" x2="250" y2="312" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Flow diagram -->
  <g filter="url(#shadow)">
    <rect x="60" y="340" width="200" height="100" rx="12" fill="#fff" stroke="#e07a5f" stroke-width="2"/>
    <text x="160" y="375" text-anchor="middle" fill="#e07a5f" font-size="28">👤</text>
    <text x="160" y="400" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">你</text>
    <text x="160" y="422" text-anchor="middle" fill="#666" font-size="12">「帮我提交外链」</text>

    <path d="M 260 390 L 310 390" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGray)"/>

    <rect x="320" y="340" width="240" height="100" rx="12" fill="#fff" stroke="#3d5a80" stroke-width="2"/>
    <text x="440" y="375" text-anchor="middle" fill="#3d5a80" font-size="28">🤖</text>
    <text x="440" y="400" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">Claude Code / AI Agent</text>
    <text x="440" y="422" text-anchor="middle" fill="#666" font-size="12">读取 CLAUDE.md → 自动引导</text>

    <path d="M 560 390 L 610 390" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGray)"/>

    <rect x="620" y="340" width="240" height="100" rx="12" fill="#fff" stroke="#81b29a" stroke-width="2"/>
    <text x="740" y="375" text-anchor="middle" fill="#81b29a" font-size="28">🚀</text>
    <text x="740" y="400" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">Backlink Pilot</text>
    <text x="740" y="422" text-anchor="middle" fill="#666" font-size="12">CLI + bb-browser + 适配器</text>

    <path d="M 860 390 L 910 390" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGray)"/>

    <rect x="920" y="340" width="220" height="100" rx="12" fill="#fff" stroke="#f2cc8f" stroke-width="2"/>
    <text x="1030" y="375" text-anchor="middle" fill="#f2cc8f" font-size="28">🌐</text>
    <text x="1030" y="400" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">259 个目录站</text>
    <text x="1030" y="422" text-anchor="middle" fill="#666" font-size="12">自动填表 → 提交</text>
  </g>

  <!-- ==================== 三种使用方式 ==================== -->
  <text x="60" y="510" fill="#1a1a2e" font-size="26" font-weight="bold">三种使用方式</text>
  <line x1="60" y1="522" x2="260" y2="522" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Claude Code -->
  <g filter="url(#shadowLg)">
    <rect x="60" y="545" width="340" height="200" rx="16" fill="#fff"/>
    <rect x="60" y="545" width="340" height="50" rx="16" fill="#3d5a80"/>
    <rect x="60" y="575" width="340" height="20" fill="#3d5a80"/>
    <text x="80" y="578" fill="#fff" font-size="20" font-weight="bold">🟢 Claude Code（推荐）</text>
    <text x="80" y="630" fill="#1a1a2e" font-size="14" font-weight="600">零学习成本</text>
    <text x="80" y="655" fill="#555" font-size="13">1. git clone → npm install</text>
    <text x="80" y="678" fill="#555" font-size="13">2. 运行 claude（打开 Claude Code）</text>
    <text x="80" y="701" fill="#555" font-size="13">3. 说「帮我提交外链」</text>
    <text x="80" y="730" fill="#81b29a" font-size="12" font-weight="600">AI 读取 CLAUDE.md → 全程引导</text>
  </g>

  <!-- OpenClaw -->
  <g filter="url(#shadowLg)">
    <rect x="430" y="545" width="340" height="200" rx="16" fill="#fff"/>
    <rect x="430" y="545" width="340" height="50" rx="16" fill="#e07a5f"/>
    <rect x="430" y="575" width="340" height="20" fill="#e07a5f"/>
    <text x="450" y="578" fill="#fff" font-size="20" font-weight="bold">🟡 OpenClaw 技能</text>
    <text x="450" y="630" fill="#1a1a2e" font-size="14" font-weight="600">Agent 技能集成</text>
    <text x="450" y="655" fill="#555" font-size="13">1. 链接到 skills 目录</text>
    <text x="450" y="678" fill="#555" font-size="13">2. 说「提交到免费目录站」</text>
    <text x="450" y="701" fill="#555" font-size="13">3. Agent 自动处理</text>
    <text x="450" y="730" fill="#81b29a" font-size="12" font-weight="600">兼容任何 MCP 客户端</text>
  </g>

  <!-- CLI -->
  <g filter="url(#shadowLg)">
    <rect x="800" y="545" width="340" height="200" rx="16" fill="#fff"/>
    <rect x="800" y="545" width="340" height="50" rx="16" fill="#81b29a"/>
    <rect x="800" y="575" width="340" height="20" fill="#81b29a"/>
    <text x="820" y="578" fill="#fff" font-size="20" font-weight="bold">🔵 CLI（手动命令行）</text>
    <text x="820" y="630" fill="#1a1a2e" font-size="14" font-weight="600">完全控制</text>
    <text x="820" y="655" fill="#555" font-size="13">1. cp config.example.yaml config.yaml</text>
    <text x="820" y="678" fill="#555" font-size="13">2. 编辑配置 → 填入产品信息</text>
    <text x="820" y="701" fill="#555" font-size="13">3. node src/cli.js submit ...</text>
    <text x="820" y="730" fill="#81b29a" font-size="12" font-weight="600">适合想完全掌控的开发者</text>
  </g>

  <!-- ==================== v2.1 更新内容 ==================== -->
  <text x="60" y="820" fill="#1a1a2e" font-size="26" font-weight="bold">v2.1 更新内容</text>
  <line x1="60" y1="832" x2="270" y2="832" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Row 1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="855" width="350" height="120" rx="12" fill="#fff"/>
    <rect x="60" y="855" width="6" height="120" rx="3" fill="#e07a5f"/>
    <text x="85" y="885" fill="#e07a5f" font-size="18" font-weight="bold">📁 项目重组</text>
    <text x="85" y="910" fill="#555" font-size="13">docs/ — VitePress 文档站</text>
    <text x="85" y="932" fill="#555" font-size="13">bak/ — 废弃适配器归档</text>
    <text x="85" y="954" fill="#555" font-size="13">根目录精简：只留 README + CLAUDE.md + LICENSE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="855" width="350" height="120" rx="12" fill="#fff"/>
    <rect x="430" y="855" width="6" height="120" rx="3" fill="#3d5a80"/>
    <text x="455" y="885" fill="#3d5a80" font-size="18" font-weight="bold">🛡️ bb-browser 增强</text>
    <text x="455" y="910" fill="#555" font-size="13">超时时间可在 config.yaml 中配置</text>
    <text x="455" y="932" fill="#555" font-size="13">启动时自动检测 Chrome 连接状态</text>
    <text x="455" y="954" fill="#555" font-size="13">evalClickReal() — 兼容 React/Vue 组件</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="855" width="340" height="120" rx="12" fill="#fff"/>
    <rect x="800" y="855" width="6" height="120" rx="3" fill="#81b29a"/>
    <text x="825" y="885" fill="#81b29a" font-size="18" font-weight="bold">✈️ 提交预检</text>
    <text x="825" y="910" fill="#555" font-size="13">启动浏览器前先 HTTP 探测</text>
    <text x="825" y="932" fill="#555" font-size="13">检测 404/500/登录/付费页面</text>
    <text x="825" y="954" fill="#555" font-size="13">死站自动跳过，不浪费时间</text>
  </g>

  <!-- Row 2 -->
  <g filter="url(#shadow)">
    <rect x="60" y="995" width="350" height="120" rx="12" fill="#fff"/>
    <rect x="60" y="995" width="6" height="120" rx="3" fill="#f2cc8f"/>
    <text x="85" y="1025" fill="#c9a227" font-size="18" font-weight="bold">📖 教程 + 文档站</text>
    <text x="85" y="1050" fill="#555" font-size="13">三步上手教程（Claude Code 版）</text>
    <text x="85" y="1072" fill="#555" font-size="13">VitePress 文档 — npm run docs:dev</text>
    <text x="85" y="1094" fill="#555" font-size="13">中英文独立版本</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="995" width="350" height="120" rx="12" fill="#fff"/>
    <rect x="430" y="995" width="6" height="120" rx="3" fill="#e07a5f"/>
    <text x="455" y="1025" fill="#e07a5f" font-size="18" font-weight="bold">💀 44 个死站标记</text>
    <text x="455" y="1050" fill="#555" font-size="13">全量巡检 259 个站点（2026 年 3 月）</text>
    <text x="455" y="1072" fill="#555" font-size="13">404/403/500 站点 → 自动跳过</text>
    <text x="455" y="1094" fill="#555" font-size="13">只提交到确认存活的站点</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="995" width="340" height="120" rx="12" fill="#fff"/>
    <rect x="800" y="995" width="6" height="120" rx="3" fill="#3d5a80"/>
    <text x="825" y="1025" fill="#3d5a80" font-size="18" font-weight="bold">🔓 开放数据</text>
    <text x="825" y="1050" fill="#555" font-size="13">2400+ 外链目标开源共享</text>
    <text x="825" y="1072" fill="#555" font-size="13">敏感数据已脱敏</text>
    <text x="825" y="1094" fill="#555" font-size="13">社区共同维护目标数据库</text>
  </g>

  <!-- ==================== 架构 ==================== -->
  <text x="60" y="1185" fill="#1a1a2e" font-size="26" font-weight="bold">架构</text>
  <line x1="60" y1="1197" x2="140" y2="1197" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <g filter="url(#shadowLg)">
    <rect x="60" y="1220" width="1080" height="280" rx="16" fill="#fff"/>

    <text x="90" y="1255" fill="#888" font-size="12" font-weight="600">接入层</text>
    <text x="90" y="1335" fill="#888" font-size="12" font-weight="600">核心层</text>
    <text x="90" y="1425" fill="#888" font-size="12" font-weight="600">引擎层</text>

    <!-- 接入层 -->
    <rect x="200" y="1235" width="140" height="40" rx="8" fill="#3d5a80" opacity="0.9"/>
    <text x="270" y="1260" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Claude Code</text>

    <rect x="360" y="1235" width="140" height="40" rx="8" fill="#3d5a80" opacity="0.7"/>
    <text x="430" y="1260" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">OpenClaw</text>

    <rect x="520" y="1235" width="140" height="40" rx="8" fill="#3d5a80" opacity="0.5"/>
    <text x="590" y="1260" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">CLI 命令行</text>

    <rect x="680" y="1235" width="160" height="40" rx="8" fill="#3d5a80" opacity="0.3"/>
    <text x="760" y="1260" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">任何 MCP 客户端</text>

    <path d="M 430 1275 L 430 1300" stroke="#ddd" stroke-width="2"/>
    <path d="M 590 1275 L 590 1300" stroke="#ddd" stroke-width="2"/>

    <!-- 核心层 -->
    <rect x="200" y="1305" width="120" height="45" rx="8" fill="#e07a5f" opacity="0.85"/>
    <text x="260" y="1325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">CLAUDE.md</text>
    <text x="260" y="1340" text-anchor="middle" fill="#fff" font-size="10">Agent 指令</text>

    <rect x="335" y="1305" width="120" height="45" rx="8" fill="#e07a5f" opacity="0.85"/>
    <text x="395" y="1325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">cli.js</text>
    <text x="395" y="1340" text-anchor="middle" fill="#fff" font-size="10">入口</text>

    <rect x="470" y="1305" width="120" height="45" rx="8" fill="#e07a5f" opacity="0.85"/>
    <text x="530" y="1325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">submit.js</text>
    <text x="530" y="1340" text-anchor="middle" fill="#fff" font-size="10">提交调度器</text>

    <rect x="605" y="1305" width="120" height="45" rx="8" fill="#e07a5f" opacity="0.85"/>
    <text x="665" y="1325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">sites/*.js</text>
    <text x="665" y="1340" text-anchor="middle" fill="#fff" font-size="10">适配器</text>

    <rect x="740" y="1305" width="120" height="45" rx="8" fill="#e07a5f" opacity="0.85"/>
    <text x="800" y="1325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">targets.yaml</text>
    <text x="800" y="1340" text-anchor="middle" fill="#fff" font-size="10">259 站点库</text>

    <rect x="875" y="1305" width="120" height="45" rx="8" fill="#e07a5f" opacity="0.85"/>
    <text x="935" y="1325" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">tracker.js</text>
    <text x="935" y="1340" text-anchor="middle" fill="#fff" font-size="10">去重追踪</text>

    <path d="M 530 1350 L 530 1385" stroke="#ddd" stroke-width="2"/>

    <!-- 引擎层 -->
    <rect x="300" y="1390" width="200" height="45" rx="8" fill="#81b29a" opacity="0.85"/>
    <text x="400" y="1410" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">bb-browser（真实 Chrome）</text>
    <text x="400" y="1425" text-anchor="middle" fill="#fff" font-size="10">推荐</text>

    <rect x="520" y="1390" width="200" height="45" rx="8" fill="#81b29a" opacity="0.5"/>
    <text x="620" y="1410" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Playwright（无头浏览器）</text>
    <text x="620" y="1425" text-anchor="middle" fill="#fff" font-size="10">备选</text>

    <rect x="740" y="1390" width="180" height="45" rx="8" fill="#81b29a" opacity="0.3"/>
    <text x="830" y="1410" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">侦察 / 验证码</text>
    <text x="830" y="1425" text-anchor="middle" fill="#fff" font-size="10">工具</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <rect y="1540" width="1200" height="260" fill="url(#headerBg)"/>

  <text x="600" y="1590" text-anchor="middle" fill="#f5f0e8" font-size="22" font-weight="bold">30 秒上手</text>

  <!-- Terminal -->
  <rect x="200" y="1615" width="800" height="140" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="225" cy="1635" r="6" fill="#ff5f56"/>
  <circle cx="245" cy="1635" r="6" fill="#ffbd2e"/>
  <circle cx="265" cy="1635" r="6" fill="#27c93f"/>

  <text x="220" y="1670" fill="#8b949e" font-size="14" font-family="'JetBrains Mono', monospace">$</text>
  <text x="240" y="1670" fill="#c9d1d9" font-size="14" font-family="'JetBrains Mono', monospace">git clone https://github.com/s87343472/backlink-pilot.git</text>
  <text x="220" y="1695" fill="#8b949e" font-size="14" font-family="'JetBrains Mono', monospace">$</text>
  <text x="240" y="1695" fill="#c9d1d9" font-size="14" font-family="'JetBrains Mono', monospace">cd backlink-pilot &amp;&amp; npm install</text>
  <text x="220" y="1720" fill="#8b949e" font-size="14" font-family="'JetBrains Mono', monospace">$</text>
  <text x="240" y="1720" fill="#c9d1d9" font-size="14" font-family="'JetBrains Mono', monospace">claude</text>
  <text x="320" y="1720" fill="#81b29a" font-size="14" font-family="'JetBrains Mono', monospace"># 然后说：「帮我提交外链」</text>

  <text x="600" y="1770" text-anchor="middle" fill="#8a8fa8" font-size="14">github.com/s87343472/backlink-pilot</text>
</svg>
