    <rect x="60" y="865" width="6" height="130" rx="3" fill="#e07a5f"/>
    <text x="85" y="895" fill="#e07a5f" font-size="18" font-weight="bold">📁 Project Restructure</text>
    <text x="85" y="920" fill="#555" font-size="13">docs/ — VitePress documentation site</text>
    <text x="85" y="942" fill="#555" font-size="13">bak/ — deprecated adapters archived</text>
    <text x="85" y="964" fill="#555" font-size="13">Clean root: only README + CLAUDE.md + LICENSE</text>
    <text x="85" y="982" fill="#888" font-size="11">项目重组：文档站 + 废弃代码归档 + 根目录精简</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="865" width="350" height="130" rx="12" fill="#fff"/>
    <rect x="430" y="865" width="6" height="130" rx="3" fill="#3d5a80"/>
    <text x="455" y="895" fill="#3d5a80" font-size="18" font-weight="bold">🛡️ bb-browser Enhanced</text>
    <text x="455" y="920" fill="#555" font-size="13">Configurable timeout from config.yaml</text>
    <text x="455" y="942" fill="#555" font-size="13">Chrome connectivity check on startup</text>
    <text x="455" y="964" fill="#555" font-size="13">evalClickReal() — React/Vue compatible</text>
    <text x="455" y="982" fill="#888" font-size="11">bb-browser 增强：超时配置 + 连接检测 + 真实点击</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="865" width="340" height="130" rx="12" fill="#fff"/>
    <rect x="800" y="865" width="6" height="130" rx="3" fill="#81b29a"/>
    <text x="825" y="895" fill="#81b29a" font-size="18" font-weight="bold">✈️ Pre-flight Checks</text>
    <text x="825" y="920" fill="#555" font-size="13">HTTP check before launching browser</text>
    <text x="825" y="942" fill="#555" font-size="13">Detect 404/500/login/paywall pages</text>
    <text x="825" y="964" fill="#555" font-size="13">Skip dead sites automatically</text>
    <text x="825" y="982" fill="#888" font-size="11">预检：先 HTTP 探测，死站不启动浏览器</text>
  </g>

  <!-- Row 2 -->
  <g filter="url(#shadow)">
    <rect x="60" y="1015" width="350" height="130" rx="12" fill="#fff"/>
    <rect x="60" y="1015" width="6" height="130" rx="3" fill="#f2cc8f"/>
    <text x="85" y="1045" fill="#c9a227" font-size="18" font-weight="bold">📖 Tutorial + Docs Site</text>
    <text x="85" y="1070" fill="#555" font-size="13">3-step Claude Code quickstart guide</text>
    <text x="85" y="1092" fill="#555" font-size="13">VitePress docs — npm run docs:dev</text>
    <text x="85" y="1114" fill="#555" font-size="13">Bilingual: English + 中文</text>
    <text x="85" y="1132" fill="#888" font-size="11">教程 + 文档站：三步上手 + 可部署文档</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="1015" width="350" height="130" rx="12" fill="#fff"/>
    <rect x="430" y="1015" width="6" height="130" rx="3" fill="#e07a5f"/>
    <text x="455" y="1045" fill="#e07a5f" font-size="18" font-weight="bold">💀 44 Dead Sites Marked</text>
    <text x="455" y="1070" fill="#555" font-size="13">Full audit of 259 targets (2026-03)</text>
    <text x="455" y="1092" fill="#555" font-size="13">404/403/500 sites → auto: no + status: dead</text>
    <text x="455" y="1114" fill="#555" font-size="13">Only submits to verified live sites</text>
    <text x="455" y="1132" fill="#888" font-size="11">巡检：44 个死站标记，只提交到确认存活的站点</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="1015" width="340" height="130" rx="12" fill="#fff"/>
    <rect x="800" y="1015" width="6" height="130" rx="3" fill="#3d5a80"/>
    <text x="825" y="1045" fill="#3d5a80" font-size="18" font-weight="bold">🔓 Open Data</text>
    <text x="825" y="1070" fill="#555" font-size="13">2400+ backlink targets open-sourced</text>
    <text x="825" y="1092" fill="#555" font-size="13">Sensitive data sanitized from git</text>
    <text x="825" y="1114" fill="#555" font-size="13">Community-maintained target database</text>
    <text x="825" y="1132" fill="#888" font-size="11">开放数据：2400+ 外链目标开源，敏感数据脱敏</text>
  </g>

