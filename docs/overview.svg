<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e07a5f"/>
      <stop offset="100%" stop-color="#f2cc8f"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#81b29a"/>
      <stop offset="100%" stop-color="#a7c4b5"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d5a80"/>
      <stop offset="100%" stop-color="#5b8fb9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLg" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1800" fill="#f8f9fa" rx="0"/>

  <!-- ==================== HEADER ==================== -->
  <rect width="1200" height="260" fill="url(#headerBg)" rx="0"/>

  <!-- Logo area -->
  <circle cx="100" cy="100" r="42" fill="url(#accent)" opacity="0.9"/>
  <text x="100" y="108" text-anchor="middle" fill="#1a1a2e" font-size="32" font-weight="bold">BP</text>

  <text x="160" y="85" fill="#f5f0e8" font-size="42" font-weight="bold">Backlink Pilot</text>
  <text x="160" y="120" fill="#e07a5f" font-size="22" font-weight="600">v2.1</text>
  <text x="220" y="120" fill="#8a8fa8" font-size="18">— Automated Backlink Submission Toolkit</text>

  <text x="160" y="155" fill="#b8bcc8" font-size="16">One config, one command. Submit your product to 259 directory sites.</text>
  <text x="160" y="178" fill="#b8bcc8" font-size="16">一条命令提交外链。配置一次，自动提交到目录站、awesome-list、搜索引擎。</text>

  <!-- Stats badges -->
  <rect x="60" y="210" width="160" height="36" rx="18" fill="#e07a5f" opacity="0.9"/>
  <text x="140" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">259 Target Sites</text>

  <rect x="240" y="210" width="200" height="36" rx="18" fill="#81b29a" opacity="0.9"/>
  <text x="340" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">226 Auto-Submittable</text>

  <rect x="460" y="210" width="180" height="36" rx="18" fill="#3d5a80" opacity="0.9"/>
  <text x="550" y="233" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">2400+ Backlink Data</text>

  <rect x="660" y="210" width="140" height="36" rx="18" fill="#f2cc8f" opacity="0.85"/>
  <text x="730" y="233" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="600">MIT Licensed</text>

  <!-- ==================== WHAT IS IT ==================== -->
  <text x="60" y="310" fill="#1a1a2e" font-size="26" font-weight="bold">What is Backlink Pilot? / 项目是什么？</text>
  <line x1="60" y1="322" x2="520" y2="322" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Flow diagram -->
  <g filter="url(#shadow)">
    <!-- Step 1: You -->
    <rect x="60" y="350" width="200" height="100" rx="12" fill="#fff" stroke="#e07a5f" stroke-width="2"/>
    <text x="160" y="385" text-anchor="middle" fill="#e07a5f" font-size="28">👤</text>
    <text x="160" y="410" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">You / 你</text>
    <text x="160" y="432" text-anchor="middle" fill="#666" font-size="12">"帮我提交外链"</text>

    <!-- Arrow 1 -->
    <path d="M 260 400 L 310 400" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGray)"/>
    <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ccc"/></marker></defs>

    <!-- Step 2: Claude Code / AI Agent -->
    <rect x="320" y="350" width="240" height="100" rx="12" fill="#fff" stroke="#3d5a80" stroke-width="2"/>
    <text x="440" y="385" text-anchor="middle" fill="#3d5a80" font-size="28">🤖</text>
    <text x="440" y="410" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">Claude Code / AI Agent</text>
    <text x="440" y="432" text-anchor="middle" fill="#666" font-size="12">Read CLAUDE.md → Auto Guide</text>

    <!-- Arrow 2 -->
    <path d="M 560 400 L 610 400" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- Step 3: Backlink Pilot -->
    <rect x="620" y="350" width="240" height="100" rx="12" fill="#fff" stroke="#81b29a" stroke-width="2"/>
    <text x="740" y="385" text-anchor="middle" fill="#81b29a" font-size="28">🚀</text>
    <text x="740" y="410" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">Backlink Pilot</text>
    <text x="740" y="432" text-anchor="middle" fill="#666" font-size="12">CLI + bb-browser + Adapters</text>

    <!-- Arrow 3 -->
    <path d="M 860 400 L 910 400" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- Step 4: Directory Sites -->
    <rect x="920" y="350" width="220" height="100" rx="12" fill="#fff" stroke="#f2cc8f" stroke-width="2"/>
    <text x="1030" y="385" text-anchor="middle" fill="#f2cc8f" font-size="28">🌐</text>
    <text x="1030" y="410" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="600">259 Directory Sites</text>
    <text x="1030" y="432" text-anchor="middle" fill="#666" font-size="12">Auto-fill forms → Submit</text>
  </g>

  <!-- ==================== THREE WAYS TO USE ==================== -->
  <text x="60" y="520" fill="#1a1a2e" font-size="26" font-weight="bold">Three Ways to Use / 三种使用方式</text>
  <line x1="60" y1="532" x2="460" y2="532" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Way 1: Claude Code -->
  <g filter="url(#shadowLg)">
    <rect x="60" y="555" width="340" height="200" rx="16" fill="#fff"/>
    <rect x="60" y="555" width="340" height="50" rx="16" fill="#3d5a80"/>
    <rect x="60" y="585" width="340" height="20" fill="#3d5a80"/>
    <text x="80" y="588" fill="#fff" font-size="20" font-weight="bold">🟢 Claude Code（推荐）</text>
    <text x="80" y="640" fill="#1a1a2e" font-size="14" font-weight="600">Zero learning curve / 零学习成本</text>
    <text x="80" y="665" fill="#555" font-size="13">1. git clone → npm install</text>
    <text x="80" y="688" fill="#555" font-size="13">2. claude（打开 Claude Code）</text>
    <text x="80" y="711" fill="#555" font-size="13">3. "帮我提交外链"</text>
    <text x="80" y="740" fill="#81b29a" font-size="12" font-weight="600">AI reads CLAUDE.md → guides everything</text>
  </g>

  <!-- Way 2: OpenClaw -->
  <g filter="url(#shadowLg)">
    <rect x="430" y="555" width="340" height="200" rx="16" fill="#fff"/>
    <rect x="430" y="555" width="340" height="50" rx="16" fill="#e07a5f"/>
    <rect x="430" y="585" width="340" height="20" fill="#e07a5f"/>
    <text x="450" y="588" fill="#fff" font-size="20" font-weight="bold">🟡 OpenClaw Skill</text>
    <text x="450" y="640" fill="#1a1a2e" font-size="14" font-weight="600">Agent skill integration / Agent 技能</text>
    <text x="450" y="665" fill="#555" font-size="13">1. ln -s to skills directory</text>
    <text x="450" y="688" fill="#555" font-size="13">2. "Submit to free directories"</text>
    <text x="450" y="711" fill="#555" font-size="13">3. Agent handles the rest</text>
    <text x="450" y="740" fill="#81b29a" font-size="12" font-weight="600">Works with any MCP-compatible client</text>
  </g>

  <!-- Way 3: CLI -->
  <g filter="url(#shadowLg)">
    <rect x="800" y="555" width="340" height="200" rx="16" fill="#fff"/>
    <rect x="800" y="555" width="340" height="50" rx="16" fill="#81b29a"/>
    <rect x="800" y="585" width="340" height="20" fill="#81b29a"/>
    <text x="820" y="588" fill="#fff" font-size="20" font-weight="bold">🔵 CLI（手动）</text>
    <text x="820" y="640" fill="#1a1a2e" font-size="14" font-weight="600">Full control / 完全控制</text>
    <text x="820" y="665" fill="#555" font-size="13">1. cp config.example.yaml config.yaml</text>
    <text x="820" y="688" fill="#555" font-size="13">2. Edit config → fill product info</text>
    <text x="820" y="711" fill="#555" font-size="13">3. node src/cli.js submit ...</text>
    <text x="820" y="740" fill="#81b29a" font-size="12" font-weight="600">Developers who want full flexibility</text>
  </g>

  <!-- ==================== V2.1 CHANGELOG ==================== -->
  <text x="60" y="830" fill="#1a1a2e" font-size="26" font-weight="bold">What's New in v2.1 / 2.1 更新内容</text>
  <line x1="60" y1="842" x2="440" y2="842" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Row 1 -->
  <g filter="url(#shadow)">
